[tox]
envlist = py310, py311, py312, py313, py314,lint, typing, coverage
skip_missing_interpreters = True

[gh-actions]
python =
  3.10: py310, lint, typing, coverage
  3.11: py311
  3.12: py312
  3.13: py313
  3.14: py314

[testenv]
commands =
  pytest --timeout=30 --cov=pytradfri --cov-report=xml {posargs}
deps =
  -rrequirements.txt
  -rrequirements_test.txt

[testenv:lint]
basepython = python3
ignore_errors = True
commands =
  pre-commit run --hook-stage manual ruff-check --all-files --show-diff-on-failure
  pre-commit run --hook-stage manual ruff-format --all-files --show-diff-on-failure
  pre-commit run --hook-stage manual pylint --all-files --show-diff-on-failure
deps =
  -rrequirements.txt
  -rrequirements_test.txt

[testenv:typing]
deps =
  -rrequirements.txt
  -rrequirements_test.txt
commands =
    pre-commit run --hook-stage manual mypy --all-files --show-diff-on-failure

[testenv:coverage]
deps =
  -rrequirements.txt
  -rrequirements_test.txt
commands =
    coverage report --fail-under=79

